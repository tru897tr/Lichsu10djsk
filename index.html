<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Lịch sử</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            max-width: 900px;
            width: 100%;
            padding: 35px 40px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8ecf1;
        }

        .header h1 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #64748b;
            font-size: 1em;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
            transition: opacity 0.3s ease;
        }

        .stats.hidden {
            opacity: 0;
            height: 0;
            margin: 0;
            overflow: hidden;
        }

        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 3px 12px rgba(102, 126, 234, 0.2);
        }

        .stat-box h3 {
            font-size: 0.85em;
            margin-bottom: 6px;
            opacity: 0.9;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-box .value {
            font-size: 1.6em;
            font-weight: 700;
        }

        .progress-bar {
            height: 6px;
            background: #e8ecf1;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .question-container {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question {
            font-size: 1.2em;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #ffffff;
            font-size: 1.05em;
            line-height: 1.5;
        }

        .option:hover:not(.correct):not(.wrong):not(.disabled) {
            border-color: #667eea;
            background: #f8fafc;
            transform: translateX(3px);
        }

        .option.correct {
            border-color: #10b981;
            background: #d1fae5;
            animation: correctBounce 0.4s ease;
        }

        @keyframes correctBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        .option.wrong {
            border-color: #ef4444;
            background: #fee2e2;
            opacity: 0.6;
            cursor: not-allowed;
            animation: wrongShake 0.4s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .option.disabled {
            cursor: not-allowed;
        }

        .option strong {
            color: #667eea;
            margin-right: 8px;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px 28px;
            font-size: 1.05em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
        }

        .nav-btn.prev {
            background: #e2e8f0;
            color: #475569;
        }

        .nav-btn.prev:hover:not(:disabled) {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        .nav-btn.next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn.next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .result-screen {
            text-align: center;
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .trophy {
            font-size: 5em;
            margin: 20px 0;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1.15em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
            margin-top: 20px;
            font-weight: 600;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .timer-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
        }

        .timer-inner {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
        }

        /* Fullscreen mode styles */
        body.fullscreen-mode {
            padding: 0;
        }

        .fullscreen-mode .container {
            max-width: 100%;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .fullscreen-mode .header {
            display: none;
        }

        .fullscreen-mode .progress-bar {
            margin-bottom: 15px;
        }

        .fullscreen-mode .question-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .fullscreen-mode .question {
            font-size: 2.5em;
            font-weight: 700;
            padding: 30px;
            margin-bottom: 20px;
            flex-shrink: 0;
            background: #f8fafc;
            border: 3px solid #667eea;
            text-align: center;
        }

        .fullscreen-mode .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            flex: 1;
            margin-bottom: 15px;
        }

        .fullscreen-mode .option {
            font-size: 1.6em;
            font-weight: 600;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 0;
            border-width: 3px;
        }

        .fullscreen-mode .option strong {
            font-size: 1.2em;
            margin-right: 12px;
        }

        .fullscreen-mode .options .option:nth-child(1) {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-color: #d97706;
        }

        .fullscreen-mode .options .option:nth-child(2) {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            border-color: #2563eb;
        }

        .fullscreen-mode .options .option:nth-child(3) {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            border-color: #059669;
        }

        .fullscreen-mode .options .option:nth-child(4) {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            border-color: #db2777;
        }

        .fullscreen-mode .options .option.correct {
            border-color: #10b981;
            border-width: 5px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
        }

        .fullscreen-mode .options .option.wrong {
            border-color: #ef4444;
            border-width: 5px;
            opacity: 0.5;
        }

        .fullscreen-mode .navigation-buttons {
            flex-shrink: 0;
            gap: 20px;
        }

        .fullscreen-mode .nav-btn {
            font-size: 1.5em;
            padding: 18px 36px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .question {
                font-size: 1.1em;
                padding: 16px;
            }

            .option {
                font-size: 1em;
                padding: 14px 16px;
            }

            .fullscreen-mode .question {
                font-size: 1.6em;
                padding: 20px;
            }

            .fullscreen-mode .option {
                font-size: 1.2em;
                padding: 20px 15px;
            }

            .fullscreen-mode .nav-btn {
                font-size: 1.2em;
                padding: 14px 24px;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 1000px;
                padding: 45px 50px;
            }

            .header h1 {
                font-size: 2.3em;
            }

            .question {
                font-size: 1.35em;
                padding: 24px;
            }

            .option {
                font-size: 1.15em;
                padding: 18px 24px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Toàn màn hình">⛶</button>

    <div class="container">
        <div class="header">
            <h1>📜 Trắc nghiệm Lịch sử</h1>
            <p>Văn minh Văn Lang - Âu Lạc</p>
        </div>

        <div id="stats" class="stats">
            <div class="stat-box">
                <h3>Câu hỏi</h3>
                <div class="value"><span id="currentQ">1</span>/<span id="totalQ">11</span></div>
            </div>
            <div class="stat-box">
                <h3>Thời gian</h3>
                <div class="value" id="timer">00:00</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div id="quizArea"></div>
    </div>

    <script>
        const questions = [
            { id: 1, question: "Nhà nước đầu tiên được hình thành trên lãnh thổ Việt Nam có tên gọi là", options: ["Văn Lang", "Lâm Ấp", "Chăm-pa", "Phù Nam"], correct: 0 },
            { id: 2, question: "Nền văn minh Văn Lang – Âu Lạc được hình thành ở khu vực nào sau đây của Việt Nam?", options: ["Khu vực Bắc Bộ và Bắc Trung Bộ Việt Nam ngày nay", "Vùng duyên hải và cao nguyên miền Trung Việt Nam", "Lưu vực sông Hồng, sông Thu Bồn và sông Cửu Long", "Vùng ven biển Nam Trung Bộ và Nam Bộ Việt Nam"], correct: 0 },
            { id: 3, question: "Văn minh Văn Lang – Âu Lạc được hình thành trên cơ sở của nền văn hóa nào sau đây?", options: ["Sa Huỳnh", "Óc Eo", "Đông Sơn", "Sơn Vi"], correct: 2 },
            { id: 4, question: "Kinh đô của nhà nước Văn Lang đặt tại", options: ["Cổ Loa (Hà Nội)", "Phong Châu (Phú Thọ)", "Phú Xuân (Huế)", "Quy Nhơn (Bình Định)"], correct: 1 },
            { id: 5, question: "Nhà nước nào sau đây là sự kế thừa và phát triển của nhà nước Văn Lang?", options: ["Âu Lạc", "Lâm Ấp", "Chăm-pa", "Phù Nam"], correct: 0 },
            { id: 6, question: "Một trong những biểu hiện chứng tỏ bước phát triển của nước Âu Lạc so với quốc gia Văn Lang là", options: ["Bộ máy nhà nước được tổ chức hoàn thiện hơn so với thời kì trước", "Lãnh thổ được mở rộng hơn trên cơ sở thống nhất Âu Việt và Lạc Việt", "Cải cách đơn vị hành chính theo hướng tập trung, thống nhất, quan liêu", "Bảo vệ vững chắc độc lập dân tộc trước sự xâm lược của quân Nam Hán"], correct: 1 },
            { id: 7, question: "Nội dung nào sau đây phản ánh đúng đặc điểm của bộ máy nhà nước Văn Lang – Âu Lạc?", options: ["Hoàn chỉnh, chặt chẽ", "Đơn giản, sơ khai", "Quan liêu, tập quyền", "Phân quyền, pháp trị"], correct: 3 },
            { id: 8, question: "Một trong những công trình kiến trúc tiêu biểu được xây dựng dưới thời kì nhà nước Âu Lạc là", options: ["Chùa Một Cột", "Tháp Phổ Minh", "Thành Cổ Loa", "Kinh thành Huế"], correct: 2 },
            { id: 9, question: "Nội dung nào sau đây không phản ánh đúng đời sống vật chất của cư dân Văn Lang – Âu Lạc?", options: ["Nguồn lương thực, thực phẩm phong phú, đa dạng", "Tin ngưỡng sùng bái các lực lượng tự nhiên phổ biến", "Đi lại chủ yếu bằng đường thủy thông qua thuyền, bè", "Nhà ở chủ yếu là kiểu nhà sàn làm bằng gỗ, tre, nứa, lá"], correct: 1 },
            { id: 10, question: "Tục thờ thần Mặt Trời là biểu hiện của tín ngưỡng nào sau đây của cư dân Văn Lang – Âu Lạc?", options: ["Thờ cúng tổ tiên", "Tin ngưỡng phồn thực", "Sùng bái tự nhiên", "Thờ thần động vật"], correct: 2 },
            { id: 11, question: "Một trong những nét độc đáo trong đời sống tinh thần của cư dân Văn Lang – Âu Lạc là", options: ["Chữ viết thể hiện tính bác học, uyên thâm", "Sùng bái núi thiêng và nàng công chúa rắn", "Hình thành tục thờ Mẫu và thờ cúng tổ tiên", "Tục lệ chôn người chết trong các mộ chum"], correct: 2 }
        ];

        let currentQuestion = 0;
        let startTime = Date.now();
        let timerInterval;
        let questionStartTime = Date.now();
        let timePerQuestion = [];
        let userAnswers = {};
        let shuffledQuestions = [];

        function initializeQuestions() {
            shuffledQuestions = questions.map(q => {
                const indices = [0, 1, 2, 3];
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                
                const shuffledOptions = indices.map(i => q.options[i]);
                const newCorrectIndex = indices.indexOf(q.correct);
                
                return {
                    id: q.id,
                    question: q.question,
                    options: shuffledOptions,
                    correct: newCorrectIndex,
                    originalCorrect: q.correct
                };
            });
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').textContent = 
                    String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            }, 1000);
        }

        function displayQuestion() {
            const q = shuffledQuestions[currentQuestion];
            const userAnswer = userAnswers[currentQuestion];
            
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('totalQ').textContent = questions.length;
            document.getElementById('progress').style.width = 
                ((currentQuestion) / questions.length) * 100 + '%';

            const quizArea = document.getElementById('quizArea');
            
            let optionsHTML = '';
            for (let idx = 0; idx < q.options.length; idx++) {
                let classes = 'option';
                let clickable = true;
                
                if (userAnswer !== undefined) {
                    if (idx === q.correct) {
                        classes += ' correct';
                    }
                    if (userAnswer.wrongAttempts && userAnswer.wrongAttempts.includes(idx)) {
                        classes += ' wrong';
                    }
                    if (userAnswer.correctAnswer !== undefined) {
                        classes += ' disabled';
                        clickable = false;
                    }
                }
                
                const onclickAttr = clickable ? 'onclick="checkAnswer(' + idx + ')"' : '';
                optionsHTML += '<div class="' + classes + '" ' + onclickAttr + '>';
                optionsHTML += '<strong>' + String.fromCharCode(65 + idx) + '.</strong> ' + q.options[idx];
                optionsHTML += '</div>';
            }

            const isAnswered = userAnswer && userAnswer.correctAnswer !== undefined;
            const prevDisabled = currentQuestion === 0 ? 'disabled' : '';
            const nextDisabled = !isAnswered ? 'disabled' : '';
            
            quizArea.innerHTML = '<div class="question-container">' +
                '<div class="question"><strong>Câu ' + (currentQuestion + 1) + ':</strong> ' + q.question + '</div>' +
                '<div class="options">' + optionsHTML + '</div>' +
                '<div class="navigation-buttons">' +
                    '<button class="nav-btn prev" onclick="prevQuestion()" ' + prevDisabled + '>← Quay lại</button>' +
                    '<button class="nav-btn next" onclick="nextQuestion()" ' + nextDisabled + '>Tiếp tục →</button>' +
                '</div>' +
            '</div>';
        }

        function checkAnswer(selected) {
            const q = shuffledQuestions[currentQuestion];
            const userAnswer = userAnswers[currentQuestion] || { wrongAttempts: [] };
            
            if (userAnswer.correctAnswer !== undefined) return;
            if (userAnswer.wrongAttempts.includes(selected)) return;
            
            const options = document.querySelectorAll('.option');
            
            if (selected === q.correct) {
                options[selected].classList.add('correct');
                
                const questionTime = Math.floor((Date.now() - questionStartTime) / 1000);
                timePerQuestion[currentQuestion] = questionTime;
                
                userAnswers[currentQuestion] = {
                    ...userAnswer,
                    correctAnswer: selected
                };
                
                options.forEach(opt => opt.classList.add('disabled'));
                
                const nextBtn = document.querySelector('.nav-btn.next');
                nextBtn.disabled = false;
                
            } else {
                options[selected].classList.add('wrong');
                userAnswer.wrongAttempts.push(selected);
                userAnswers[currentQuestion] = userAnswer;
                
                options[selected].style.pointerEvents = 'none';
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                questionStartTime = Date.now();
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            clearInterval(timerInterval);
            const totalTime = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(totalTime / 60);
            const seconds = totalTime % 60;

            const validTimes = timePerQuestion.filter(t => t !== undefined);
            const avgTime = validTimes.length > 0 ? Math.floor(validTimes.reduce((a, b) => a + b, 0) / validTimes.length) : 0;
            const fastestTime = validTimes.length > 0 ? Math.min(...validTimes) : 0;
            const slowestTime = validTimes.length > 0 ? Math.max(...validTimes) : 0;

            document.getElementById('stats').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            
            document.getElementById('quizArea').innerHTML = 
                '<div class="result-screen">' +
                    '<div class="trophy">🏆</div>' +
                    '<h2 style="font-size: 2em; margin-bottom: 10px; color: #667eea;">Hoàn thành!</h2>' +
                    '<p style="font-size: 1.15em; color: #64748b; margin-bottom: 25px;">Bạn đã hoàn thành bài trắc nghiệm Lịch sử</p>' +
                    '<div class="timer-circle">' +
                        '<div class="timer-inner">' + minutes + ':' + String(seconds).padStart(2, '0') + '</div>' +
                    '</div>' +
                    '<div style="background: #f8fafc; padding: 28px; border-radius: 16px; margin: 20px 0; border: 1px solid #e2e8f0;">' +
                        '<h3 style="color: #667eea; margin-bottom: 18px; font-size: 1.2em;">📊 Thống kê chi tiết</h3>' +
                        '<div style="display: grid; gap: 12px; text-align: left;">' +
                            '<div style="padding: 14px 18px; background: white; border-radius: 10px; border-left: 3px solid #667eea;">' +
                                '<strong style="color: #667eea;">⏱️ Tổng thời gian:</strong> <span style="color: #475569;">' + minutes + ' phút ' + seconds + ' giây</span>' +
                            '</div>' +
                            '<div style="padding: 14px 18px; background: white; border-radius: 10px; border-left: 3px solid #764ba2;">' +
                                '<strong style="color: #667eea;">📈 Trung bình/câu:</strong> <span style="color: #475569;">' + avgTime + ' giây</span>' +
                            '</div>' +
                            '<div style="padding: 14px 18px; background: white; border-radius: 10px; border-left: 3px solid #10b981;">' +
                                '<strong style="color: #667eea;">⚡ Câu nhanh nhất:</strong> <span style="color: #475569;">' + fastestTime + ' giây</span>' +
                            '</div>' +
                            '<div style="padding: 14px 18px; background: white; border-radius: 10px; border-left: 3px solid #ef4444;">' +
                                '<strong style="color: #667eea;">🐢 Câu chậm nhất:</strong> <span style="color: #475569;">' + slowestTime + ' giây</span>' +
                            '</div>' +
                            '<div style="padding: 14px 18px; background: white; border-radius: 10px; border-left: 3px solid #6366f1;">' +
                                '<strong style="color: #667eea;">✅ Tổng số câu:</strong> <span style="color: #475569;">' + questions.length + ' câu</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<button class="restart-btn" onclick="location.reload()">🔄 Làm lại</button>' +
                '</div>';
        }

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const statsDiv = document.getElementById('stats');

        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', function() {
            if (document.fullscreenElement) {
                statsDiv.classList.add('hidden');
                document.body.classList.add('fullscreen-mode');
            } else {
                statsDiv.classList.remove('hidden');
                document.body.classList.remove('fullscreen-mode');
            }
        });

        window.addEventListener('DOMContentLoaded', function() {
            initializeQuestions();
            displayQuestion();
            startTimer();
        });
    </script>
</body>
</html>
